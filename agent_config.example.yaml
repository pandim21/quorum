# ── Band credentials for each committee member ──────────────────────────────
# Copy this file to  agent_config.yaml  and fill in the two values per role.
#
# For each role below: go to https://app.band.ai/agents → New Agent → External
# Agent, create it using EXACTLY the display name shown in the comment, then copy
# the agent's UUID into `agent_id` and its API key into `api_key`.
#
# agent_config.yaml is git-ignored — never commit real keys. This .example file
# (placeholders only) is the safe-to-commit template.

